<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nursing Quiz Platform</title>
    <style>
        :root {
            --primary-color: #0076a3;
            --secondary-color: #004d6c;
            --success-color: #2e7d32;
            --error-color: #c62828;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            max-width: 650px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h1 { margin: 0; font-size: 24px; }
        p.subtitle { margin: 5px 0 0 0; opacity: 0.9; font-size: 14px; }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        .menu-btn {
            display: block;
            width: 100%;
            background-color: #e0f2f1;
            color: var(--secondary-color);
            border: 2px solid #b2dfdb;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .menu-btn:hover {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .question-text {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            line-height: 1.4;
        }

        .meta-info {
            font-size: 12px;
            color: #777;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .option-btn {
            display: block;
            width: 100%;
            background-color: #fff;
            border: 2px solid #e0e0e0;
            padding: 12px 15px;
            margin: 10px 0;
            border-radius: 8px;
            font-size: 15px;
            text-align: left;
            cursor: pointer;
            transition: background 0.2s;
        }

        .option-btn:hover:not([disabled]) {
            background-color: #f5f5f5;
            border-color: #bbb;
        }

        .option-btn.correct {
            background-color: #e8f5e9 !important;
            border-color: var(--success-color) !important;
            color: var(--success-color);
            font-weight: bold;
        }

        .option-btn.incorrect {
            background-color: #ffebee !important;
            border-color: var(--error-color) !important;
            color: var(--error-color);
        }

        .feedback-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
            line-height: 1.5;
        }

        .feedback-box.correct {
            display: block;
            background-color: #e8f5e9;
            border-left: 5px solid var(--success-color);
        }

        .feedback-box.incorrect {
            display: block;
            background-color: #ffebee;
            border-left: 5px solid var(--error-color);
        }

        .explanation {
            margin-top: 8px;
            font-size: 14px;
            color: #444;
            font-style: italic;
        }

        .action-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 15px;
        }

        .action-btn:hover { background-color: var(--secondary-color); }
        
        .score-banner {
            font-size: 16px;
            font-weight: bold;
            text-align: right;
            margin-bottom: 10px;
            color: var(--primary-color);
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>KMU Nursing Past Papers Hub</h1>
        <p class="subtitle">Interactive Quiz Platform for BSN Students</p>
    </header>

    <div id="menu-screen" class="card">
        <h2 style="margin-top:0;">Select a Subject to Practice:</h2>
        <div id="subject-list"></div>
    </div>

    <div id="quiz-screen" class="card hidden">
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <button class="action-btn" style="margin:0; padding:6px 12px; font-size:13px;" onclick="showMenu()">← Back to Menu</button>
            <div id="score-display" class="score-banner">Score: 0/0</div>
        </div>
        <hr style="border:0; border-top:1px solid #eee; margin:15px 0;">
        
        <div id="question-container">
            <div id="meta-info" class="meta-info"></div>
            <div id="question-text" class="question-text"></div>
            <div id="options-container"></div>
            
            <div id="feedback" class="feedback-box">
                <strong id="feedback-title"></strong>
                <div id="explanation-text" class="explanation"></div>
                <button id="next-btn" class="action-btn" onclick="nextQuestion()">Next Question →</button>
            </div>
        </div>
    </div>

    <div id="result-screen" class="card hidden">
        <h2 style="margin-top:0; text-align:center;">🎉 Quiz Completed!</h2>
        <div id="final-score-text" style="font-size: 20px; text-align:center; margin:20px 0; font-weight:bold;"></div>
        <div style="text-align: center;">
            <button class="action-btn" onclick="showMenu()">Try Another Subject</button>
        </div>
    </div>
</div>

<script>
    // Your processing database converted safely to native JavaScript Objects
    const QUESTION_BANK = {
        "Anatomy & Physiology-I": [
            {
                "id": "AP_2024_Q1",
                "year": "2024",
                "question": "Which of the following statements is NOT true?",
                "options": {
                    "A": "A condyloid joint is triaxial",
                    "B": "Synovial fluid reduces friction",
                    "C": "Coronal suture is for parietal and frontal bone articulation",
                    "D": "Synostosis is a bony joint"
                },
                "answer": "A",
                "explanation": "A condyloid joint is biaxial (allowing movement in two planes: flexion/extension and abduction/adduction), not triaxial."
            },
            {
                "id": "AP_2024_Q2",
                "year": "2024",
                "question": "Which of the following is the powerhouse of the cell?",
                "options": {
                    "A": "Mitochondria",
                    "B": "Golgi Body",
                    "C": "Endoplasmic Reticulum",
                    "D": "Ribosomes"
                },
                "answer": "A",
                "explanation": "Mitochondria generate most of the cell's supply of adenosine triphosphate (ATP), used as a source of chemical energy."
            },
            {
                "id": "AP_2024_Q3",
                "year": "2024",
                "question": "The receptors for hormones such as estrogen and parathyroid hormone are present in:",
                "options": {
                    "A": "Osteoblasts",
                    "B": "Osteocytes",
                    "C": "Osteoclasts",
                    "D": "None of the above"
                },
                "answer": "A",
                "explanation": "Osteoblasts contain surface and intracellular functional receptors for systemic hormones like estrogen and PTH to regulate bone deposition."
            },
            {
                "id": "AP_2024_Q4",
                "year": "2024",
                "question": "What is the first process that occurs after a blood vessel is damaged?",
                "options": {
                    "A": "Haemolysis",
                    "B": "Vasoconstriction",
                    "C": "Platelet plug formation",
                    "D": "Coagulation"
                },
                "answer": "B",
                "explanation": "Vascular spasm or local vasoconstriction occurs immediately upon vessel injury to reduce blood loss."
            },
            {
                "id": "AP_2024_Q5",
                "year": "2024",
                "question": "Which bone forms the floor of the nasal cavity & posterior part of the hard palate?",
                "options": {
                    "A": "Zygomatic bones",
                    "B": "Lacrimal bones",
                    "C": "Nasal bones",
                    "D": "Palatine bones"
                },
                "answer": "D",
                "explanation": "The horizontal plates of the palatine bones meet posteriorly to form the rear segment of the hard palate and nasal floor."
            }
        ]
    };

    let currentSubject = "";
    let currentQuestions = [];
    let currentQuestionIdx = 0;
    let score = 0;

    // Initialization: Build the main menu interface dynamically
    function initPlatform() {
        const listContainer = document.getElementById("subject-list");
        listContainer.innerHTML = "";
        
        Object.keys(QUESTION_BANK).forEach(subject => {
            const btn = document.createElement("button");
            btn.className = "menu-btn";
            btn.innerText = `📚 ${subject} (${QUESTION_BANK[subject].length} Questions)`;
            btn.onclick = () => startQuiz(subject);
            listContainer.appendChild(btn);
        });
    }

    function startQuiz(subject) {
        currentSubject = subject;
        currentQuestions = [...QUESTION_BANK[subject]];
        currentQuestionIdx = 0;
        score = 0;
        
        document.getElementById("menu-screen").classList.add("hidden");
        document.getElementById("result-screen").classList.add("hidden");
        document.getElementById("quiz-screen").classList.remove("hidden");
        
        loadQuestion();
    }

    function loadQuestion() {
        // Clear previous state
        document.getElementById("feedback").className = "feedback-box";
        
        const q = currentQuestions[currentQuestionIdx];
        document.getElementById("score-display").innerText = `Score: ${score}/${currentQuestionIdx}`;
        document.getElementById("meta-info").innerText = `${currentSubject} — Year: ${q.year} (Q. ${currentQuestionIdx + 1}/${currentQuestions.length})`;
        document.getElementById("question-text").innerText = q.question;
        
        const optionsContainer = document.getElementById("options-container");
        optionsContainer.innerHTML = "";
        
        Object.keys(q.options).forEach(letter => {
            const btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerHTML = `<strong>${letter}:</strong> ${q.options[letter]}`;
            btn.onclick = () => checkAnswer(letter, btn);
            optionsContainer.appendChild(btn);
        });
    }

    function checkAnswer(selectedLetter, clickedBtn) {
        const q = currentQuestions[currentQuestionIdx];
        const buttons = document.querySelectorAll(".option-btn");
        
        // Disable all options once answered
        buttons.forEach(btn => btn.disabled = true);
        
        const feedbackBox = document.getElementById("feedback");
        const feedbackTitle = document.getElementById("feedback-title");
        const explanationText = document.getElementById("explanation-text");
        
        explanationText.innerText = q.explanation;
        
        if (selectedLetter === q.answer) {
            clickedBtn.classList.add("correct");
            feedbackBox.className = "feedback-box correct";
            feedbackTitle.innerText = "✅ Correct Answer!";
            score++;
        } else {
            clickedBtn.classList.add("incorrect");
            feedbackBox.className = "feedback-box incorrect";
            feedbackTitle.innerText = `❌ Incorrect.`;
            
            // Highlight the correct answer item
            buttons.forEach(btn => {
                if(btn.innerText.startsWith(q.answer + ":")) {
                    btn.classList.add("correct");
                }
            });
        }
        
        document.getElementById("score-display").innerText = `Score: ${score}/${currentQuestionIdx + 1}`;
    }

    function nextQuestion() {
        currentQuestionIdx++;
        if (currentQuestionIdx < currentQuestions.length) {
            loadQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        document.getElementById("quiz-screen").classList.add("hidden");
        const resultScreen = document.getElementById("result-screen");
        resultScreen.classList.remove("hidden");
        
        const pct = Math.round((score / currentQuestions.length) * 100);
        document.getElementById("final-score-text").innerHTML = `
            You scored: <span style="color:var(--primary-color);">${score}/${currentQuestions.length}</span><br>
            Percentage: <span style="color:${pct >= 50 ? 'var(--success-color)' : 'var(--error-color)'};">${pct}%</span>
        `;
    }

    function showMenu() {
        document.getElementById("quiz-screen").classList.add("hidden");
        document.getElementById("result-screen").classList.add("hidden");
        document.getElementById("menu-screen").classList.remove("hidden");
        initPlatform();
    }

    // Run on startup
    window.onload = initPlatform;
</script>

</body>
</html>
