<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPK Nursing Past Papers Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>KPK Nursing Past Papers Portal</h1>
            <p>Select your region and year to begin practicing</p>
        </header>

        <div id="home-screen" class="card">
            <h2>Select Past Paper</h2>
            
            <div class="filter-group">
                <label for="region-select">Choose Region:</label>
                <select id="region-select" class="dropdown">
                    <option value="swat">Swat Region</option>
                    <option value="peshawar">Peshawar Region</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="year-select">Choose Year:</label>
                <select id="year-select" class="dropdown">
                    <option value="2024">2024</option>
                    <option value="2023">2023</option>
                    <option value="2022">2022</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="subject-select">Choose Subject:</label>
                <select id="subject-select" class="dropdown">
                    <option value="fon">Fundamentals of Nursing (FON)</option>
                    <option value="anatomy">Anatomy & Physiology</option>
                </select>
            </div>

            <button class="btn btn-primary start-btn" onclick="initiateQuiz()">Start Past Paper</button>
        </div>

        <div id="quiz-screen" class="card hidden">
            <div class="quiz-header">
                <span id="quiz-meta-title">Paper Details</span>
                <span id="progress">Question 1 of 10</span>
            </div>
            
            <div id="question-container">
                <h3 id="question-text">Loading question...</h3>
                <div id="options-container" class="options-list">
                    </div>
            </div>

            <div class="quiz-footer">
                <button id="skip-btn" class="btn btn-secondary" onclick="nextQuestion()">Skip Question</button>
            </div>
        </div>

        <div id="result-screen" class="card hidden">
            <h2>Paper Completed!</h2>
            <div class="score-display">
                <p>Your Final Score:</p>
                <h3 id="final-score">0 / 0</h3>
            </div>
            <button class="btn btn-primary" onclick="showHomeScreen()">Back to Selection</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
